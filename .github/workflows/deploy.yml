name: Build & Deploy

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    name: Build, push e deploy no Portainer
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Configura o Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build e push da imagem
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/controle-de-metas:latest
            ${{ secrets.DOCKER_USERNAME }}/controle-de-metas:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Dispara redeploy no Portainer
        run: |
          curl -s -X POST "${{ secrets.PORTAINER_WEBHOOK_URL }}"
