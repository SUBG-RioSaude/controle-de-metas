name: Build & Deploy

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    name: Build, push e deploy no Portainer
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Configura o Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build e push da imagem
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            NEXT_PUBLIC_AUTH_API=http://subg:5240
            NEXT_PUBLIC_METAS_API=http://subg:5240
            NEXT_PUBLIC_SUPPORT_API=http://subg:2100/api
            NEXT_PUBLIC_SYSTEMS_API=http://devcac:7995/api
            NEXT_PUBLIC_SYSTEM_ID=9eb3c75a-1e83-499c-807d-860d053650e5
            NEXT_PUBLIC_GOOGLE_CLIENT_ID=163817569782-4hcgtpliiik20cm2k651ntfjtv2oq809.apps.googleusercontent.com
            NEXT_PUBLIC_DISCORD_CATEGORY_ID=1483912575736479896
          no-cache: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/controle-de-metas:latest
            ${{ secrets.DOCKER_USERNAME }}/controle-de-metas:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Dispara redeploy no Portainer
        run: |
          curl -s -X POST "${{ secrets.PORTAINER_WEBHOOK_URL }}"